<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail — Smart Furniture Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/customer/components/navbar/navbar.css" />
  <link rel="stylesheet" href="/frontend/customer/components/cart/cart.css" />
  <link rel="stylesheet" href="/frontend/customer/components/footer/footer.css" />
  <link rel="stylesheet" href="/frontend/customer/product-detail/product.css" />
</head>
<body>

    <!-- ======= NAVBAR (navbar.html) ======= -->
  <div id="navbar-container"></div>
  <script src="/frontend/customer/components/navbar/navbar.js"></script>
  <script src="/frontend/customer/components/cart/cart.js"></script>
  <script>
    function loadNavbar(activeNavId) {
      fetch("/frontend/customer/components/navbar/navbar.html")
        .then((r) => r.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
          initNavbar().then(() => {
            if (activeNavId) {
              document.getElementById(activeNavId)?.classList.add("active");
            }
          });
        });
    }
    loadNavbar("nav-home"); 
  </script>

  <!-- Main Content -->
  <main class="pd-main">

    <!-- Breadcrumb -->
    <nav class="pd-breadcrumb" id="pd-breadcrumb">
      <a href="/frontend/customer/home/home.html">Home</a>
      <span class="bc-sep">›</span>
      <a href="#" id="bc-category">Category</a>
      <span class="bc-sep">›</span>
      <span id="bc-name">Product</span>
    </nav>

    <!-- Product Layout -->
    <div class="pd-layout">

      <!-- LEFT: Images -->
      <div class="pd-gallery">
        <div class="pd-main-img-wrap">
          <img id="pd-main-img" src="" alt="Product image" />
          <button class="pd-zoom-btn" id="pd-zoom-btn" aria-label="Zoom image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
        <div class="pd-thumbs" id="pd-thumbs"></div>
      </div>

      <!-- RIGHT: Info -->
      <div class="pd-info">

        <p class="pd-sku" id="pd-sku">—</p>
        <h1 class="pd-title" id="pd-title">Loading...</h1>

        <div class="pd-tags" id="pd-tags"></div>

        <p class="pd-price" id="pd-price">—</p>

        <!-- Dimension -->
        <div class="pd-spec-row" id="pd-dim-row">
          <span class="pd-spec-label">DIMENSION</span>
          <div class="pd-dim-chips" id="pd-dims"></div>
        </div>

        <!-- Color -->
        <div class="pd-spec-row" id="pd-color-row">
          <span class="pd-spec-label">COLOR</span>
          <div class="pd-colors" id="pd-colors"></div>
        </div>

        <!-- Selected summary -->
        <div class="pd-summary" id="pd-summary">
          <span class="pd-summary-name" id="pd-summary-name">—</span>
          <span class="pd-summary-qty" id="pd-summary-qty">1x</span>
          <span class="pd-summary-price" id="pd-summary-unit-price">—</span>
        </div>

        <!-- Qty + Add to Cart -->
        <div class="pd-actions">
          <div class="pd-qty-wrap">
            <button class="pd-qty-btn" id="btn-minus" aria-label="Decrease">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="pd-qty-val" id="pd-qty">1</span>
            <button class="pd-qty-btn" id="btn-plus" aria-label="Increase">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="pd-stock-badge" id="pd-stock">In Stock</span>
          </div>

          <button class="pd-add-btn" id="pd-add-btn">
            <span>Add to Cart</span>
            <span class="pd-add-divider">|</span>
            <span id="pd-total-price">—</span>
          </button>
        </div>

        <!-- Perks -->
        <ul class="pd-perks">
          <li>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#53A143" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Free shipping on every order.
          </li>
          <li>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#53A143" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Order before 12:00pm for same day dispatch
          </li>
          <li>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#53A143" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Support &amp; ordering open 7 day a week
          </li>
        </ul>

      </div><!-- /.pd-info -->
    </div><!-- /.pd-layout -->

  </main>

  <!-- Zoom overlay -->
  <div class="pd-zoom-overlay" id="pd-zoom-overlay">
    <button class="pd-zoom-close" id="pd-zoom-close" aria-label="Close zoom">✕</button>
    <img id="pd-zoom-img" src="" alt="Zoomed product" />
  </div>

  <!-- Footer -->
  <div id="footer-container"></div>
  <script src="/frontend/customer/components/footer/footer.js"></script>
  <script>
    fetch("/frontend/customer/components/footer/footer.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("footer-container").innerHTML = html;
        initFooter();
      });
  </script>

  <script src="/frontend/customer/product-detail/product.js"></script>
</body>
</html>
