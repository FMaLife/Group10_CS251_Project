<!--
  navbar.html
  ============================================================
  โค้ดหลักของ Navbar อยู่ที่นี่
  วิธีใช้ในหน้าอื่น: ใช้ fetch() หรือ include ด้วย JS
  ============================================================
-->
<link rel="stylesheet" href="/frontend/customer/components/navbar/navbar.css" />

<nav id="smart-navbar" role="navigation" aria-label="Main navigation">

  <!-- ====== TOP BAR ====== -->
  <div class="navbar-top">

    <!-- Logo -->
    <a href="/frontend/customer/home/home.html" class="navbar-logo" aria-label="Smart Furniture Warehouse - Home">
      <img src="/frontend/customer/assets/logo_smart-furniture-warehouse.svg" alt="Smart Furniture Warehouse logo" />
    </a>

    <!-- Search Box -->
    <div class="navbar-search" role="search">
      <input
        id="navbar-search-input"
        type="search"
        placeholder="Search furniture..."
        aria-label="Search"
        autocomplete="off"
      />
      <button
        id="navbar-search-btn"
        class="navbar-search-btn"
        aria-label="Submit search"
      >
        <!-- Search icon -->
        <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </button>
    </div>

    <!-- Right Actions -->
    <div class="navbar-actions">

      <!-- Account -->
      <div class="profile-dropdown-wrap" id="profile-wrap">
        <button class="navbar-account" id="navbar-account-btn" aria-label="Your Account">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span id="navbar-account-name"></span>
        </button>
        <div class="profile-dropdown" id="profile-dropdown">
          <a href="/frontend/customer/profile/profile.html" class="profile-dropdown-item">Profile</a>
          <button class="profile-dropdown-item" id="logout-btn">Logout</button>
        </div>
      </div>

      <div class="navbar-divider" aria-hidden="true"></div>

      <!-- Cart (new) -->
      <button id="cart-icon-btn" style="position:relative;background:none;border:none;cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;" aria-label="Shopping cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" style="display:block;">
          <path d="M7.5 7.67V6.7C7.5 4.45 9.31 2.24 11.56 2.03C14.24 1.77 16.5 3.88 16.5 6.51V7.89" style="stroke:#46494F;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;fill:none;"/>
          <path d="M9 22H15C19.02 22 19.74 20.39 19.95 18.43L20.7 12.43C20.97 9.99 20.27 8 16 8H8C3.73 8 3.03 9.99 3.3 12.43L4.05 18.43C4.26 20.39 4.98 22 9 22Z" style="stroke:#46494F;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;fill:none;"/>
          <path d="M15.5 12H15.51" style="stroke:#46494F;stroke-width:2;stroke-linecap:round;"/>
          <path d="M8.5 12H8.51" style="stroke:#46494F;stroke-width:2;stroke-linecap:round;"/>
        </svg>
        <span id="cart-badge" class="navbar-cart-count" aria-live="polite">0</span>
      </button>

      <!-- Orders -->
      <a href="/frontend/customer/checkout/orders/orders.html" class="navbar-orders-btn" aria-label="My Orders">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" stroke="#46494F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="9" y="3" width="6" height="4" rx="1" stroke="#46494F" stroke-width="1.8" stroke-linejoin="round"/>
          <line x1="9" y1="12" x2="15" y2="12" stroke="#46494F" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="9" y1="16" x2="13" y2="16" stroke="#46494F" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </a>

    </div>
  </div><!-- /.navbar-top -->

  <!-- ====== BOTTOM BAR ====== -->
  <div class="navbar-bottom">

    <!-- Home -->
    <a href="/frontend/customer/home/home.html" class="nav-link" id="nav-home">Home</a>

    <!-- Category dropdown -->
    <div class="nav-dropdown-wrap">
      <button
        id="category-btn"
        class="nav-link"
        aria-haspopup="listbox"
        aria-expanded="false"
        aria-controls="category-dropdown-list"
      >
        Category
        <svg class="chevron-icon" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Items injected by navbar.js → loadCategories() -->
      <ul
        id="category-dropdown"
        class="dropdown-panel"
        role="listbox"
        aria-label="Product categories"
      >
        <!-- dynamic -->
      </ul>
    </div>

    <!-- Orders -->
    <a href="/frontend/customer/checkout/orders/orders.html" class="nav-link" id="nav-orders">Orders</a>

    <!-- Contact Us → scrolls to footer -->
    <a href="#footer" id="contact-us-link" class="nav-link">Contact Us</a>

  </div><!-- /.navbar-bottom -->

</nav>
