<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — Smart Furniture Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/customer/components/navbar/navbar.css" />
  <link rel="stylesheet" href="/frontend/customer/components/cart/cart.css" />
  <link rel="stylesheet" href="/frontend/customer/components/footer/footer.css" />
  <link rel="stylesheet" href="/frontend/customer/checkout/checkout.css" />
</head>
<body>

  <div id="navbar-container"></div>
  <script src="/frontend/customer/components/navbar/navbar.js"></script>
  <script src="/frontend/customer/components/cart/cart.js"></script>
  <script>
    function loadNavbar() {
      fetch("/frontend/customer/components/navbar/navbar.html")
        .then((r) => r.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
          initNavbar().then(() => {
            document.getElementById("nav-orders")?.classList.add("active");
          });
        });
    }
    loadNavbar();
  </script>

  <main class="orders-main">

    <h1 class="orders-title">Orders</h1>
    <div class="orders-divider"></div>

    <!-- Order list — inject โดย orders.js -->
    <div id="orders-list">
      <div class="review-loading">Loading orders...</div>
    </div>

    <div class="orders-footer">
      <p class="orders-footer-hint">New order, Click button bellow.</p>
      <button class="shop-now-btn" onclick="window.location.href='/frontend/customer/home/home.html'">
        Shop Now
      </button>
    </div>

  </main>

  <!-- QR overlay — แสดงเมื่อกด "Waiting for payment" -->
  <div class="qr-backdrop" id="qr-backdrop">
    <div class="qr-modal">
      <h3 class="qr-title">Scan to Pay</h3>
      <p class="qr-subtitle">After payment, please wait for the status to update.<br>Once updated, the process is complete.</p>
      <div class="qr-image-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="#000" d="M13 21v-2h2v2zm-2-2v-5h2v5zm8-3v-4h2v4zm-2-4v-2h2v2zM5 14v-2h2v2zm-2-2v-2h2v2zm9-7V3h2v2zM4.5 7.5h3v-3h-3zM3 8V4q0-.425.288-.712T4 3h4q.425 0 .713.288T9 4v4q0 .425-.288.713T8 9H4q-.425 0-.712-.288T3 8m1.5 11.5h3v-3h-3zM3 20v-4q0-.425.288-.712T4 15h4q.425 0 .713.288T9 16v4q0 .425-.288.713T8 21H4q-.425 0-.712-.288T3 20M16.5 7.5h3v-3h-3zM15 8V4q0-.425.288-.712T16 3h4q.425 0 .713.288T21 4v4q0 .425-.288.713T20 9h-4q-.425 0-.712-.288T15 8m2 13v-3h-2v-2h4v3h2v2zm-4-7v-2h4v2zm-4 0v-2H7v-2h6v2h-2v2zm1-5V5h2v2h2v2zM5.25 6.75v-1.5h1.5v1.5zm0 12v-1.5h1.5v1.5zm12-12v-1.5h1.5v1.5z"/></svg>
      </div>
      <div class="qr-amount" id="orders-qr-amount">0 THB</div>
      <div class="qr-actions">
        <button class="qr-btn qr-btn-later"    onclick="handleOrdersQrClose()">Not ready</button>
        <button class="qr-btn qr-btn-complete" onclick="handleOrdersQrComplete()">Complete</button>
      </div>
    </div>
  </div>

  <!-- footer ใส่ใน tag <body> ส่วนสุดท้าย -->
  <div id="footer-container"></div>
  <script src="/frontend/customer/components/footer/footer.js"></script>
  <script>
    fetch("/frontend/customer/components/footer/footer.html")
      .then((r) => r.text())
      .then((html) => {
        document.getElementById("footer-container").innerHTML = html;
        initFooter();
      });
  </script>

  <script src="/frontend/customer/checkout/orders/orders.js"></script>

</body>
</html>
