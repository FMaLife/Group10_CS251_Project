<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Complete — Smart Furniture Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/customer/components/navbar/navbar.css" />
  <link rel="stylesheet" href="/frontend/customer/components/cart/cart.css" />
  <link rel="stylesheet" href="/frontend/customer/checkout/checkout.css" />

<body>

  <div id="navbar-container"></div>
  <script src="/frontend/customer/components/navbar/navbar.js"></script>
  <script src="/frontend/customer/components/cart/cart.js"></script>
  <script>
    function loadNavbar() {
      fetch("/frontend/customer/components/navbar/navbar.html")
        .then((r) => r.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
          initNavbar();
        });
    }
    loadNavbar();
  </script>

    <!-- ====== Stepper ====== -->

        <span class="step-label">Order Complete</span>
      </div>
    </div>

  <main class="checkout-main">

    <!-- Order summary -->
    <div class="complete-section">

      <div class="complete-header">
        <h2 class="complete-title">Your Order</h2>
        <div class="complete-status" id="complete-status">
          <!-- inject โดย complete.js -->
        </div>
      </div>

      <!-- Items — inject โดย complete.js -->
      <div id="complete-items-list"></div>

      <!-- Total row -->
      <div class="complete-total-row">
        <span>TOTAL</span>
        <span id="complete-total">— THB</span>
      </div>

      <!-- Meta: shipping + price summary -->
      <div class="complete-meta">
        <div>
          <div class="complete-meta-row">
            <span class="complete-meta-label">Shipping</span>
            <span class="complete-meta-value" id="meta-address">—</span>
          </div>
          <div class="complete-meta-row">
            <span class="complete-meta-label">Shipping Options</span>
            <span class="complete-meta-value">Same-Day Dispatching</span>
          </div>
        </div>
        <div>
          <div class="complete-meta-row">
            <span class="complete-meta-label">Subtotal</span>
            <span class="complete-meta-value" id="meta-subtotal">— THB</span>
          </div>
          <div class="complete-meta-row">
            <span class="complete-meta-label">Shipping Costs</span>
            <span class="complete-meta-value">Free</span>
          </div>
          <div class="complete-meta-row">
            <span class="complete-meta-label">TOTAL</span>
            <span class="complete-meta-value red" id="meta-total">— THB</span>
          </div>
        </div>
      </div>

    </div>

    <div class="complete-footer">
      <p class="complete-footer-hint">New Order, Click button bellow</p>
      <button class="shop-now-btn" onclick="window.location.href='/frontend/customer/home/home.html'">
        Shop Now
      </button>
    </div>

  </main>

  <script src="/frontend/customer/checkout/complete/complete.js"></script>

</body>
</html>
