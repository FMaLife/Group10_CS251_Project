<form method="POST" class="form-box"
    {% if is_edit %}
        action="{% url 'edit_item' model_name object.id %}"
    {% else %}
        action="{% url 'add_item' model_name %}"
    {% endif %}
>
    {% csrf_token %}

    <div class="form-group">
        {{ form.role.label_tag }}
        {{ form.role }}
        {{ form.role.errors }}
    </div>


    <div class="form-group">
        {{ form.name.label_tag }}
        {{ form.name }}
        {{ form.name.errors }}
    </div>

    <div class="form-group">
        {{ form.phone.label_tag }}
        {{ form.phone }}
        {{ form.phone.errors }}
    </div>

        <button type="submit" class="save-btn">
            {% if is_edit %}
                Save Changes
            {% else %}
                Add New Employee
            {% endif %}
        </button>
</form>
