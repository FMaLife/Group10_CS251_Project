<form method="POST" class="form-box">
    {% csrf_token %}

    <div class="form-group">
        <label>Role</label>
        <input name="role">
    </div>


    <div class="form-group">
        <label>Full Name</label>
        <input name="name">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input name="phone">
    </div>

    <button type="submit">Add New Employee</button>
</form>
