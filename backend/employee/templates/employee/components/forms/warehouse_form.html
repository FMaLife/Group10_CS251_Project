<form method="POST" class="form-box">
    {% csrf_token %}

    <div class="form-group">
        <label>Warehouse Name</label>
        <input name="name">
    </div>

    <div class="form-group">
        <label>Warehouse Contact Number</label>
        <input name="phone">
    </div>

    <div class="form-group">
        <label>Address</label>
        <input name="address">
    </div>

    <button type="submit">Add New Warehouse</button>
</form>
