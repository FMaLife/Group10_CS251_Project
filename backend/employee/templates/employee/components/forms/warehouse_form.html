<form method="POST" class="form-box"
    {% if is_edit %}
          action="/edit/{{ model_name }}/{{ object.id }}/"
    {% else %}
        action="/add/{{ model_name }}/"
    {% endif %}
>
    {% csrf_token %}

    <div class="form-group">
        {{ form.name.label_tag }}
        {{ form.name }}
        {{ form.name.errors }}
    </div>

    <div class="form-group">
        {{ form.phone.label_tag }}
        {{ form.phone }}
        {{ form.phone.errors }}
    </div>

    <div class="form-group">
        {{ form.address.label_tag }}
        {{ form.address }}
        {{ form.address.errors }}
    </div>

    <button type="submit" class="save-btn">
        {% if is_edit %}
            Save Changes
        {% else %}
            Add New Warehouse
        {% endif %}
    </button>
</form>
