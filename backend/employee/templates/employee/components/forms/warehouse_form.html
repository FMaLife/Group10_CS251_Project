<form method="POST" class="form-box"
    {% if is_edit %}
          action="/edit/{{ model_name }}/{{ object.pk }}/"
    {% else %}
        action="/add/{{ model_name }}/"
    {% endif %}
>
    {% csrf_token %}

    <div class="form-group">
        {{ form.wname.label_tag }}
        {{ form.wname }}
        {{ form.wname.errors }}
    </div>

    <div class="form-group">
        {{ form.wphone.label_tag }}
        {{ form.wphone }}
        {{ form.wphone.errors }}
    </div>

    <div class="form-group">
        {{ form.waddress.label_tag }}
        {{ form.waddress }}
        {{ form.waddress.errors }}
    </div>

    <button type="submit" class="save-btn">
        {% if is_edit %}
            Save Changes
        {% else %}
            Add New Warehouse
        {% endif %}
    </button>
</form>
