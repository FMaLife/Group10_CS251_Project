<form method="POST" class="form-box">
    {% csrf_token %}

    <div class="info-grid">

        <div class="form-group">
            <label>Product</label>
            <input name="name">
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input name="quantity">
        </div>


    </div>

    <button type="submit">Add New Purchase Order</button>
</form>
