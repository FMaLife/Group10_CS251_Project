<form method="POST" class="form-box">
    {% csrf_token %}

    <div class="form-group">
        <label>Name</label>
        <input name="product_name">
    </div>

    <div class="form-group">
        <label>Price</label>
        <input name="price">
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <input name="quantity">
    </div>

    <button type="submit">Add New Product</button>
</form>
